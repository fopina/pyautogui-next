name: 🧪 tests

on:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: false
  push:
    branches-ignore:
      # these are already tested by publish-dev
      - dev
      - dev/*
      - dev-*

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y scrot xauth xvfb

      - name: Install dependencies
        run: |
          pip install uv
          uv sync --dev

      - name: Lint check
        id: lint-check
        # allow tests to run even if this fails
        continue-on-error: true
        run: |
          make lint-check

      - name: Run Linux GUI tests
        if: runner.os == 'Linux'
        env:
          PYAUTOGUI_RUN_GUI_TESTS: "1"
          XDG_SESSION_TYPE: x11
        run: |
          xvfb-run -a make gui-test

      - name: Run macOS and Windows GUI tests
        if: runner.os != 'Linux'
        env:
          PYAUTOGUI_RUN_GUI_TESTS: "1"
        run: |
          make gui-test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results

      - name: Final check
        if: ${{ steps.lint-check.outcome == 'failure' }}
        run: |
          echo Lint check failed, check its log
          exit 1
