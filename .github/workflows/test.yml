name: 🧪 tests

on:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: false
  push:
    branches-ignore:
      # these are already tested by publish-dev
      - dev
      - dev/*
      - dev-*

jobs:
  lint-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install uv
          uv sync --dev

      - name: Lint check
        run: |
          make lint-check

  tests:
    needs: lint-check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.13"]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # install 3.12 for the gui-test-app
          python-version: |
            3.12
            ${{ matrix.python-version }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y scrot xauth xvfb

      - name: Install dependencies
        run: |
          pip install uv
          uv sync --dev

      - name: Run Linux GUI tests
        if: runner.os == 'Linux'
        env:
          XDG_SESSION_TYPE: x11
        run: |
          xvfb-run -a make test-gui

      - name: Run macOS and Windows GUI tests
        if: runner.os != 'Linux'
        run: |
          make test-gui

      - name: Upload GUI test screenshots
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: gui-test-screenshots-${{ matrix.os }}-${{ matrix.python-version }}
          path: artifacts/gui-test-screenshots
          if-no-files-found: ignore

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: ${{ matrix.os }}-${{ matrix.python-version }}-${{ matrix.python-version }}

      - name: Upload test results to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: ${{ matrix.os }}-${{ matrix.python-version }}-${{ matrix.python-version }}
          report_type: test_results
